name: Update OSMU index
on:
  schedule:
    - cron: "0 0 * * 1"   # every Monday 00:00 UTC
  workflow_dispatch: {}    # allow manual run

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Build data + patch site
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m osmu.build
      - name: Commit refreshed data
        run: |
          git config user.name "osmu-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data.json site/index.html || true
          git commit -m "chore: weekly OSMU refresh ($(date -u +%F))" || echo "no changes"
          git push || echo "nothing to push"
